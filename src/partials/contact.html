<section class="section contact-section" id="contact">
  <div class="contact-bg-wrapper">
    <div class="container contact-container">
      <div class="contact-content-wrapper">
        <div class="contact-text-wrapper">
          <h2 class="section-title contact-title">Leave Your Mark</h2>
          <picture>
            <source
              srcset="./img/about/line-desk.png"
              media="(min-width: 1440px)"
              width="409"
              height="2" />
            <source srcset="./img/about/line-mob.png" width="343" height="2" />
            <img
              class="line-img"
              src="./img/about/line-mob.png"
              alt="Line"
              width="343"
              height="2"
          /></picture>
          <p class="contact-subtitle">
            Every voice adds a new layer to our story. Reach out to share your
            impressions, ask a question, or simply say hello from your side of
            the frame.
          </p>
          <a href="mailto:info@softframe.online" class="contact-link">
            <span class="contact-link-email-span">info@softframe.online</span>
            <svg class="contact-icon" width="26" height="26">
              <use href="./img/sprite.svg#icon-arrow"></use>
            </svg>
          </a>
        </div>
      </div>
    </div>
  </div>
</section>
