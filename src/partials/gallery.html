<section class="gallery-section section" id="gallery">
  <div class="gallery-bg-wrapper">
    <div class="container gallery-container">
      <div class="gallery-content-wrapper">
        <h2 class="section-title gallery-title">Gallery</h2>
        <picture>
          <source
            srcset="./img/about/line-desk.png"
            media="(min-width: 1440px)"
            width="409"
            height="2" />
          <source srcset="./img/about/line-mob.png" width="343" height="2" />
          <img
            class="line-img gallery-line-img"
            src="./img/about/line-mob.png"
            alt="Line"
            width="343"
            height="2"
        /></picture>
        <div class="gallery-swiper-container">
          <ul class="swiper-wrapper gallery-swiper-wrapper">
            <li class="swiper-slide gallery-slide">
              <img
                class="gallery-img"
                src="./img/gallery/gallery-img1-mob.png"
                alt="Screenshot of the game"
                width="304"
                height="522"
                loading="lazy"
              />
            </li>
            <li class="swiper-slide gallery-slide">
              <picture>
                <source
                  srcset="./img/gallery/gallery-img2-desk.png"
                  media="(min-width: 1440px)"
                  width="576"
                  height="784" />
                <source
                  srcset="./img/gallery/gallery-img2-mob.png"
                  width="304"
                  height="522" />
                <img
                  class="gallery-img"
                  src="./img/gallery/gallery-img2-mob.png"
                  alt="Screenshot of the game"
                  width="304"
                  height="522"
                  loading="lazy"
              /></picture>
            </li>
            <li class="swiper-slide gallery-slide">
              <img
                class="gallery-img"
                src="./img/gallery/gallery-img3-mob.png"
                alt="Screenshot of the game"
                width="304"
                height="522"
                loading="lazy"
              />
            </li>
          </ul>
        </div>
      </div>
    </div>
  </div>
</section>
